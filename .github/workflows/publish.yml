name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish-python:
    name: Publish Python packages to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC for trusted publishing

    strategy:
      matrix:
        package:
          - { dir: packages/agentpassport, name: agentpassport }
          - { dir: packages/agentpassport-registry, name: agentpassport-registry }
          - { dir: packages/agentpassport-adapters, name: agentpassport-adapters }
          - { dir: packages/agentpassport-cli, name: agentpassport-cli }

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build ${{ matrix.package.name }}
        working-directory: ${{ matrix.package.dir }}
        run: uv build --out-dir dist/

      - name: Publish ${{ matrix.package.name }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ matrix.package.dir }}/dist/
          skip-existing: true

  publish-npm:
    name: Publish @agentpassport/core to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        working-directory: packages/agentpassport-ts
        run: npm install

      - name: Build
        working-directory: packages/agentpassport-ts
        run: npm run build

      - name: Publish to npm
        working-directory: packages/agentpassport-ts
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @agentpassport/core version 2>/dev/null || echo "none")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "Version $CURRENT already published, skipping."
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
