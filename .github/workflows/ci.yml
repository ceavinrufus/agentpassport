name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --all-packages
      - name: Run tests
        run: uv run pytest

  test-typescript:
    name: Test TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "packages/agentpassport-ts/package-lock.json"
      - name: Install dependencies
        run: npm ci
        working-directory: packages/agentpassport-ts
      - name: Run tests
        run: npx vitest run
        working-directory: packages/agentpassport-ts

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Install dependencies
        run: uv sync --all-extras --all-packages
      - name: Run ruff
        run: uv run ruff check .

  lint-typescript:
    name: Lint TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "packages/agentpassport-ts/package-lock.json"
      - name: Install dependencies
        run: npm ci
        working-directory: packages/agentpassport-ts
      - name: Type check
        run: npx tsc --noEmit
        working-directory: packages/agentpassport-ts
