[project]
name = "aps-adapters"
version = "0.1.0"
description = "Adapter templates for wrapping existing tools as APS agents"
requires-python = ">=3.11"
dependencies = [
    "aps-sdk",
    "httpx>=0.27",
]

[tool.uv.sources]
aps-sdk = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aps_adapters"]
