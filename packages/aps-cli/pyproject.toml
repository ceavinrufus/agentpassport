[project]
name = "aps-cli"
version = "0.1.0"
description = "CLI tools for APS trace viewing and key management"
requires-python = ">=3.11"
dependencies = [
    "aps-sdk",
    "click>=8.1",
    "rich>=13.0",
]

[project.scripts]
aps = "aps_cli.main:cli"

[tool.uv.sources]
aps-sdk = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aps_cli"]
