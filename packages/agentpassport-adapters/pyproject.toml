[project]
name = "agentpassport-adapters"
version = "0.3.0"
description = "MCP and REST adapters for agentpassport agents"
requires-python = ">=3.11"
dependencies = [
    "agentpassport",
    "httpx>=0.27",
]

[tool.uv.sources]
agentpassport = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentpassport_adapters"]
