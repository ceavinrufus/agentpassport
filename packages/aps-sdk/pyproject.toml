[project]
name = "aps-sdk"
version = "0.1.0"
description = "Python SDK for the Agent Protocol Stack"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0",
    "pynacl>=1.5.0",
    "httpx>=0.27",
    "anyio>=4.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.4"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aps_sdk"]
