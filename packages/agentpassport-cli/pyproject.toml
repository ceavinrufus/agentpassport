[project]
name = "agentpassport-cli"
version = "0.3.0"
description = "CLI tools for agentpassport trace viewing and key management"
requires-python = ">=3.11"
dependencies = [
    "agentpassport",
    "click>=8.1",
    "rich>=13.0",
]

[project.scripts]
agentpass = "agentpassport_cli.main:cli"
ap = "agentpassport_cli.main:cli"

[tool.uv.sources]
agentpassport = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentpassport_cli"]
