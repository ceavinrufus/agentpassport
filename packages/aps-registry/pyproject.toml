[project]
name = "aps-registry"
version = "0.1.0"
description = "Reference registry for APS capability discovery"
requires-python = ">=3.11"
dependencies = [
    "aps-sdk",
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "aiosqlite>=0.20",
    "httpx>=0.28.1",
]

[tool.uv.sources]
aps-sdk = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/aps_registry"]
