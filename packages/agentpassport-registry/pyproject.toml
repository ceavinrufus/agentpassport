[project]
name = "agentpassport-registry"
version = "0.3.0"
description = "Trusted agent registry with AgentCard signature verification"
requires-python = ">=3.11"
dependencies = [
    "agentpassport",
    "fastapi>=0.111",
    "uvicorn>=0.30",
    "aiosqlite>=0.20",
    "httpx>=0.28.1",
    "slowapi>=0.1.9,<0.2",
]

[tool.uv.sources]
agentpassport = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentpassport_registry"]
