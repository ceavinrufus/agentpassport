[project]
name = "agentpassport"
version = "0.2.0"
description = "Trust and authorization layer for multi-agent systems"
requires-python = ">=3.11"
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "pydantic>=2.0",
    "pynacl>=1.5.0",
    "httpx>=0.27",
    "anyio>=4.0",
]

[project.optional-dependencies]
otel = ["opentelemetry-api>=1.20", "opentelemetry-sdk>=1.20"]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23", "ruff>=0.4", "starlette>=0.37", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/agentpassport"]
